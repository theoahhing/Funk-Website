<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funk Produce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html">
        <img src="Images/FUNK MAIN LOGO DARK (NO BACKING).PNG" class="logo">
      </a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <section id="home" class="hero">
    <div>
      <h1>Funk's Produce</h1>
      <p>
        Funk's Produce was first founded by Jacob Funk...
      </p>
      <img src="Images/FUNK ICON DARK (NO BACKING).PNG" class="image">
    </div>
  </section>

  <footer>
    &copy; <span id="year"></span> Funk's Produce. All rights reserved.
  </footer>

  <div class="chat-window" id="chatWindow">
    <div class="chat-header">
      <span>Chat</span>
      <button class="chat-close" id="chatClose">&times;</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Type your message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <button class="chat-fab" id="chatFab" aria-label="Chat With Us">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" fill="none">
      <path d="M7.5 18.5 4 20V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H7.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Chat With Us</span>
  </button>

  <script src="script.js"></script>
  
</body>
</html>
